<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SolveMate AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: linear-gradient(135deg, #f4f4f2 0%, #e8ecef 45%, #f8fafc 100%);
            --card: rgba(255, 255, 255, 0.84);
            --card-strong: rgba(255, 255, 255, 0.95);
            --border: rgba(25, 35, 55, 0.12);
            --text: #121826;
            --muted: rgba(18, 24, 38, 0.65);
            --accent: #0f766e;
            --accent-2: #2563eb;
            --accent-soft: rgba(15, 118, 110, 0.12);
            --shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
            --input: rgba(255, 255, 255, 0.72);
            --user: linear-gradient(135deg, rgba(15, 118, 110, 0.16), rgba(37, 99, 235, 0.12));
            --bot: rgba(17, 24, 39, 0.03);
        }

        body.dark-mode {
            --bg: linear-gradient(135deg, #08111f 0%, #101b31 45%, #1a2237 100%);
            --card: rgba(10, 16, 30, 0.82);
            --card-strong: rgba(10, 16, 30, 0.95);
            --border: rgba(120, 180, 255, 0.18);
            --text: #f8fafc;
            --muted: rgba(248, 250, 252, 0.68);
            --accent: #4ade80;
            --accent-2: #60a5fa;
            --accent-soft: rgba(74, 222, 128, 0.12);
            --shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
            --input: rgba(255, 255, 255, 0.05);
            --user: linear-gradient(135deg, rgba(74, 222, 128, 0.14), rgba(96, 165, 250, 0.12));
            --bot: rgba(255, 255, 255, 0.04);
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            margin: 0;
            font-family: "Space Grotesk", sans-serif;
            color: var(--text);
            background: var(--bg);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .bg-orb {
            position: fixed;
            inset: auto;
            border-radius: 999px;
            filter: blur(14px);
            pointer-events: none;
            z-index: 0;
            opacity: 0.65;
        }

        .bg-orb.one {
            width: 24rem;
            height: 24rem;
            top: -6rem;
            left: -8rem;
            background: radial-gradient(circle, rgba(37, 99, 235, 0.18), transparent 70%);
        }

        .bg-orb.two {
            width: 28rem;
            height: 28rem;
            right: -10rem;
            bottom: -10rem;
            background: radial-gradient(circle, rgba(15, 118, 110, 0.18), transparent 70%);
        }

        .app-shell {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            padding: 24px;
        }

        .layout {
            max-width: 1480px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: minmax(300px, 360px) minmax(0, 1fr);
            gap: 20px;
            align-items: stretch;
            min-height: calc(100vh - 48px);
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            backdrop-filter: blur(16px);
            border-radius: 24px;
        }

        .brand-card {
            display: flex;
            flex-direction: column;
            padding: 22px;
            min-height: 0;
        }

        .brand-head {
            display: flex;
            gap: 14px;
            align-items: flex-start;
        }

        .logo {
            width: 54px;
            height: 54px;
            border-radius: 18px;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: #fff;
            display: grid;
            place-items: center;
            font-weight: 700;
            font-size: 28px;
            box-shadow: 0 16px 34px rgba(37, 99, 235, 0.25);
            flex-shrink: 0;
        }

        .brand h1 {
            margin: 0;
            font-size: 2rem;
            line-height: 1;
            letter-spacing: -0.05em;
        }

        .brand p {
            margin: 8px 0 0;
            color: var(--muted);
            line-height: 1.5;
        }

        .brand-meta {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 18px;
        }

        .pill {
            font-size: 0.82rem;
            padding: 8px 12px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .history-box {
            margin-top: 18px;
            display: flex;
            flex-direction: column;
            min-height: 0;
            flex: 1;
            border-top: 1px solid var(--border);
            padding-top: 16px;
        }

        .history-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }

        .history-top h2 {
            margin: 0;
            font-size: 1rem;
            letter-spacing: -0.02em;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }

        .icon-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--input);
            color: var(--text);
            cursor: pointer;
            display: grid;
            place-items: center;
            transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
            font-size: 1rem;
        }

        .icon-btn:hover {
            transform: translateY(-1px);
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.12);
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow: auto;
            resize: vertical;
            min-height: 220px;
            max-height: 62vh;
            padding-right: 4px;
        }

        .history-item {
            position: relative;
            border: 1px solid var(--border);
            background: var(--card-strong);
            border-radius: 16px;
            padding: 12px 44px 12px 12px;
            cursor: pointer;
            transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
        }

        .history-item:hover {
            transform: translateY(-1px);
            border-color: var(--accent);
            background: var(--accent-soft);
        }

        .history-item.active {
            border-color: var(--accent);
            box-shadow: 0 0 0 1px var(--accent-soft) inset;
        }

        .history-preview {
            font-size: 0.92rem;
            color: var(--text);
            line-height: 1.45;
        }

        .history-time {
            margin-top: 6px;
            font-size: 0.75rem;
            color: var(--muted);
            font-family: "IBM Plex Mono", monospace;
        }

        .history-delete {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 28px;
            height: 28px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: var(--input);
            color: #ef4444;
            cursor: pointer;
            display: grid;
            place-items: center;
            padding: 0;
            line-height: 1;
            font-size: 0.9rem;
        }

        .history-delete:hover {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.12);
        }

        .chat-card {
            display: flex;
            flex-direction: column;
            min-height: 0;
            padding: 22px;
        }

        .chat-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 16px;
        }

        .chat-title {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .chat-title h2 {
            margin: 0;
            font-size: 1.45rem;
            letter-spacing: -0.04em;
        }

        .chat-title p {
            margin: 0;
            color: var(--muted);
            line-height: 1.45;
        }

        .messages {
            flex: 1;
            min-height: 0;
            overflow: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
            padding-right: 6px;
        }

        .message {
            max-width: min(80%, 760px);
            padding: 14px 16px;
            border-radius: 18px;
            border: 1px solid var(--border);
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .message.user {
            margin-left: auto;
            background: var(--user);
        }

        .message.bot {
            margin-right: auto;
            background: var(--bot);
        }

        .tag {
            display: block;
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--accent);
            margin-bottom: 8px;
        }

        .composer {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
            display: grid;
            gap: 12px;
        }

        .composer textarea {
            width: 100%;
            min-height: 92px;
            resize: vertical;
            border-radius: 18px;
            border: 1px solid var(--border);
            background: var(--input);
            color: var(--text);
            font: inherit;
            padding: 14px 16px;
            outline: none;
        }

        .composer textarea::placeholder {
            color: var(--muted);
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .primary-btn {
            border: 0;
            border-radius: 999px;
            padding: 12px 18px;
            cursor: pointer;
            font-weight: 600;
            color: #08111f;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            transition: transform 0.18s ease, box-shadow 0.18s ease;
            box-shadow: 0 12px 24px rgba(37, 99, 235, 0.15);
        }

        .primary-btn:hover {
            transform: translateY(-1px);
        }

        .secondary-btn {
            border: 1px solid var(--border);
            background: var(--input);
            color: var(--text);
        }

        .step-box {
            margin-top: 10px;
            padding: 10px 12px;
            border-left: 3px solid var(--accent);
            background: var(--accent-soft);
            border-radius: 12px;
        }

        .final-answer-box {
            margin-top: 12px;
            padding: 12px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: #08111f;
            font-weight: 700;
        }

        .empty-state {
            color: var(--muted);
            border: 1px dashed var(--border);
            border-radius: 18px;
            padding: 18px;
            text-align: center;
            background: var(--input);
        }

        .history-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .mini-btn {
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
            border-radius: 999px;
            padding: 8px 12px;
            cursor: pointer;
        }

        body.preview-mobile .app-shell {
            padding: 12px;
        }

        body.preview-mobile .layout {
            grid-template-columns: minmax(240px, 320px) minmax(0, 1fr);
            gap: 12px;
            max-width: 1480px;
            min-height: calc(100vh - 24px);
        }

        body.preview-mobile .brand-card,
        body.preview-mobile .chat-card {
            width: 100%;
        }

        @media (max-width: 720px) {
            .app-shell {
                padding: 14px;
            }

            .layout {
                gap: 14px;
                min-height: calc(100vh - 28px);
                grid-template-columns: minmax(230px, 280px) minmax(0, 1fr);
            }

            .brand-card,
            .chat-card {
                padding: 18px;
                border-radius: 20px;
            }

            .message {
                max-width: 92%;
            }

            .history-list {
                max-height: 40vh;
            }
        }

        @media (max-width: 560px) {
            .app-shell {
                padding: 10px;
            }

            .layout {
                grid-template-columns: minmax(190px, 240px) minmax(0, 1fr);
                gap: 10px;
            }

            .brand-card,
            .chat-card {
                padding: 14px;
                border-radius: 18px;
            }

            .brand h1 {
                font-size: 1.35rem;
            }

            .logo {
                width: 42px;
                height: 42px;
                font-size: 22px;
            }

            .history-top {
                align-items: flex-start;
            }

            .controls {
                gap: 8px;
            }

            .icon-btn {
                width: 36px;
                height: 36px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-orb one"></div>
    <div class="bg-orb two"></div>

    <main class="app-shell">
        <section class="layout">
            <aside class="card brand-card">
                <div class="brand-head">
                    <div class="logo" aria-hidden="true">∑</div>
                    <div class="brand">
                        <h1>SolveMate AI</h1>
                        <p>One AI chat for mathematics, step-by-step solutions, and clean final answers.</p>
                    </div>
                </div>

                <div class="brand-meta">
                    <span class="pill">Math-only assistant</span>
                    <span class="pill">Quick Response</span>
                    <span class="pill">Responsive view</span>
                </div>

                <div class="history-box">
                    <div class="history-top">
                        <h2>Chat History</h2>
                        <div class="controls">
                            <button class="icon-btn" id="theme-toggle" type="button" aria-label="Toggle theme" title="Toggle theme">☀</button>
                            <button class="icon-btn" id="view-toggle" type="button" aria-label="Toggle mobile preview" title="Toggle mobile preview">📱</button>
                        </div>
                    </div>
                    <div id="history-list" class="history-list"></div>
                    <div class="history-actions">
                        <button class="mini-btn" id="refresh-history" type="button">Refresh history</button>
                        <button class="mini-btn" id="clear-view" type="button">Clear chat view</button>
                    </div>
                </div>
            </aside>

            <section class="card chat-card">
                <div class="chat-header">
                    <div class="chat-title">
                        <h2>Ask SolveMate</h2>
                        <p> Do Anyproblem in the step-by-step manner .</p>
                    </div>
                </div>

                <div id="messages" class="messages"></div>

                <form id="chat-form" class="composer">
                    <textarea id="user-input" placeholder="Ask a math problem, for example: Solve 2x + 5 = 17" rows="4"></textarea>
                    <div class="actions">
                        <button class="secondary-btn primary-btn" type="button" id="suggest-btn">Suggest</button>
                        <button class="primary-btn" type="submit">Send</button>
                    </div>
                </form>
            </section>
        </section>
    </main>

    <script>
        const form = document.getElementById("chat-form");
        const input = document.getElementById("user-input");
        const chatBox = document.getElementById("messages");
        const historyList = document.getElementById("history-list");
        const suggestBtn = document.getElementById("suggest-btn");
        const themeToggle = document.getElementById("theme-toggle");
        const viewToggle = document.getElementById("view-toggle");
        const refreshHistoryBtn = document.getElementById("refresh-history");
        const clearViewBtn = document.getElementById("clear-view");
        const body = document.body;

        let historyCache = [];
        let activeHistoryIndex = null;

        function setTheme(mode) {
            body.classList.toggle("dark-mode", mode === "dark");
            themeToggle.textContent = body.classList.contains("dark-mode") ? "☾" : "☀";
            localStorage.setItem("solvemate-theme", mode);
        }

        function toggleTheme() {
            setTheme(body.classList.contains("dark-mode") ? "light" : "dark");
        }

        function setPreview(mode) {
            body.classList.toggle("preview-mobile", mode === "mobile");
            viewToggle.textContent = body.classList.contains("preview-mobile") ? "🖥" : "📱";
            localStorage.setItem("solvemate-view", mode);
        }

        function togglePreview() {
            setPreview(body.classList.contains("preview-mobile") ? "desktop" : "mobile");
        }

        function escapeHtml(text) {
            return String(text)
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#39;");
        }

        function parseAssistantText(text) {
            const safe = escapeHtml(text);
            if (safe.includes("FINAL ANSWER:")) {
                const [before, after] = safe.split("FINAL ANSWER:");
                return `
                    ${before ? `<div>${before.replace(/\n/g, "<br>")}</div>` : ""}
                    <div class="final-answer-box">FINAL ANSWER: ${after.trim()}</div>
                `;
            }

            if (safe.match(/STEP\s+\d+:/)) {
                const parts = safe.split(/STEP\s+\d+:/);
                const steps = parts
                    .filter(Boolean)
                    .map((part) => `<div class="step-box">${part.trim().replace(/\n/g, "<br>")}</div>`)
                    .join("");
                return steps || safe.replace(/\n/g, "<br>");
            }

            return safe.replace(/\n/g, "<br>");
        }

        function scrollChatToBottom() {
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function renderMessage(role, text, meta = {}) {
            const bubble = document.createElement("div");
            bubble.className = `message ${role}`;
            if (meta.index !== undefined) {
                bubble.dataset.historyIndex = meta.index;
            }

            if (role === "bot") {
                bubble.innerHTML = `<span class="tag">SolveMate AI</span>${parseAssistantText(text)}`;
            } else {
                bubble.innerHTML = escapeHtml(text).replace(/\n/g, "<br>");
            }

            chatBox.appendChild(bubble);
            scrollChatToBottom();
        }

        function clearChatView() {
            chatBox.innerHTML = "";
            const empty = document.createElement("div");
            empty.className = "empty-state";
            empty.innerHTML = "The assistant is ready. Choose a history item or ask a new math question.";
            chatBox.appendChild(empty);
        }

        function setActiveHistory(index) {
            activeHistoryIndex = index;
            document.querySelectorAll(".history-item").forEach((node) => {
                node.classList.toggle("active", Number(node.dataset.index) === Number(index));
            });
        }

        function renderConversationFromHistory(item, index) {
            chatBox.innerHTML = "";
            renderMessage("user", item.user || "", { index });
            renderMessage("bot", item.bot || "", { index });
            setActiveHistory(index);
        }

        function renderHistoryList() {
            historyList.innerHTML = "";

            if (!historyCache.length) {
                historyList.innerHTML = '<div class="empty-state">No chat history yet.</div>';
                return;
            }

            historyCache.slice().reverse().forEach((item, reversedIndex) => {
                const index = historyCache.length - 1 - reversedIndex;
                const row = document.createElement("div");
                row.className = "history-item";
                row.dataset.index = String(index);
                row.innerHTML = `
                    <div class="history-preview">${escapeHtml((item.user || "").slice(0, 90) || "Untitled chat")}</div>
                    <div class="history-time">${escapeHtml(item.timestamp || "")}</div>
                    <button class="history-delete" type="button" aria-label="Delete history item" title="Delete history item">×</button>
                `;
                row.querySelector(".history-delete").addEventListener("click", async (event) => {
                    event.stopPropagation();
                    const ok = confirm("Delete this history item?");
                    if (!ok) return;
                    try {
                        const response = await fetch(`/delete-history/${index}`, { method: "DELETE" });
                        if (response.ok) {
                            if (Number(activeHistoryIndex) === Number(index)) {
                                clearChatView();
                                activeHistoryIndex = null;
                            }
                            await loadHistory();
                        }
                    } catch (error) {
                        console.error("Error deleting history item:", error);
                    }
                });
                row.addEventListener("click", () => renderConversationFromHistory(item, index));
                historyList.appendChild(row);
            });
        }

        async function loadHistory() {
            try {
                const response = await fetch("/history");
                if (!response.ok) return;
                const data = await response.json();
                historyCache = Array.isArray(data) ? data : [];
                renderHistoryList();
            } catch (error) {
                console.error("Error loading history:", error);
            }
        }

        async function sendMessage(message) {
            renderMessage("user", message);
            input.value = "";

            const typing = document.createElement("div");
            typing.className = "message bot";
            typing.innerHTML = '<span class="tag">SolveMate AI</span>Typing...';
            chatBox.appendChild(typing);
            scrollChatToBottom();

            try {
                const response = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message })
                });

                const data = await response.json();
                typing.remove();

                if (!response.ok) {
                    renderMessage("bot", data?.details || data?.error || "Something went wrong.");
                    return;
                }

                renderMessage("bot", data.reply || "I could not generate a response.");
                loadHistory();
            } catch (error) {
                typing.remove();
                renderMessage("bot", `Network error: ${error.message || error}`);
            }
        }

        async function suggestPrompt() {
            try {
                const response = await fetch("/suggest");
                const data = await response.json();
                if (response.ok && data.suggestion) {
                    input.value = data.suggestion;
                    input.focus();
                }
            } catch (error) {
                renderMessage("bot", "Could not fetch a suggestion right now.");
            }
        }

        const savedTheme = localStorage.getItem("solvemate-theme") || "light";
        setTheme(savedTheme);

        const savedView = localStorage.getItem("solvemate-view") || "desktop";
        setPreview(savedView);

        themeToggle.addEventListener("click", toggleTheme);
        viewToggle.addEventListener("click", togglePreview);
        refreshHistoryBtn.addEventListener("click", loadHistory);
        clearViewBtn.addEventListener("click", clearChatView);
        suggestBtn.addEventListener("click", suggestPrompt);

        form.addEventListener("submit", (event) => {
            event.preventDefault();
            const text = input.value.trim();
            if (!text) return;
            sendMessage(text);
        });

        input.addEventListener("keydown", (event) => {
            if (event.key === "Enter" && !event.shiftKey) {
                event.preventDefault();
                form.requestSubmit();
            }
        });

        clearChatView();
        loadHistory();
    </script>
</body>
</html>
